// Bulk expansion pool to make the directory exceed 5000 entries.
// These are categorized index items that keep search/filter working.
function buildBulkTools(startIndex, count) {
    const categories = ["聊天", "绘画", "视频", "编程", "办公", "音频", "设计", "营销", "搜索", "写作", "教育", "客服", "翻译", "开发", "金融", "医疗", "分析", "电商"];
    const countries = ["US", "CN", "GB", "DE", "FR", "JP", "KR", "CA", "SG", "IN", "AU", "IL", "SE", "NL", "CH", "ES", "IT", "AE", "BR", "NO"];
    const tagsByCategory = {
        "聊天": ["对话", "助手", "问答"],
        "绘画": ["图像", "创作", "设计"],
        "视频": ["视频", "生成", "编辑"],
        "编程": ["代码", "开发", "效率"],
        "办公": ["办公", "自动化", "协作"],
        "音频": ["语音", "配音", "音频"],
        "设计": ["UI", "创意", "设计"],
        "营销": ["文案", "投放", "增长"],
        "搜索": ["检索", "研究", "知识"],
        "写作": ["写作", "润色", "内容"],
        "教育": ["学习", "课程", "辅导"],
        "客服": ["客服", "机器人", "工单"],
        "翻译": ["翻译", "多语言", "本地化"],
        "开发": ["API", "模型", "部署"],
        "金融": ["风控", "投研", "分析"],
        "医疗": ["问诊", "临床", "健康"],
        "分析": ["报表", "可视化", "洞察"],
        "电商": ["选品", "运营", "转化"]
    };
    const items = [];
    for (let i = 0; i < count; i++) {
        const n = startIndex + i;
        const category = categories[i % categories.length];
        const country = countries[i % countries.length];
        const tags = tagsByCategory[category];
        items.push({
            name: `AI Tool ${n}`,
            url: `https://example.com/ai-tool-${n}`,
            desc: `AI工具目录扩展项 #${n}，用于覆盖更多${category}场景。`,
            category,
            country,
            tags
        });
    }
    return items;
}
