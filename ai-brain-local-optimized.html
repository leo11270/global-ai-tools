        }

        toolsGrid.innerHTML = pageTools.map(tool => `
            <div class="tool-card" onclick="window.open('${tool.url}', '_blank')">
                <div class="tool-header">
                    <span class="tool-name">${tool.name}</span>
                    <a href="${tool.url}" target="_blank" class="tool-link" onclick="event.stopPropagation()">访问</a>
                </div>
                <p class="tool-desc">${tool.desc}</p>
                <div class="tool-tags">
                    ${(tool.tags || []).slice(0, 3).map(t => `<span class="tool-tag">${t}</span>`).join('')}
                </div>
                <div class="tool-meta">
                    <span class="tool-country"><span class="flag">${countryFlags[tool.country] || '🌍'}</span></span>
                    <span class="tool-category">${tool.category}</span>
                </div>
            </div>
        `).join('');

        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">‹</button>`;

        const maxVisible = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
        let endPage = Math.min(totalPages, startPage + maxVisible - 1);
        if (endPage - startPage < maxVisible - 1) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }

        if (startPage > 1) {
            html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
            if (startPage > 2) html += `<span style="color:#666">...</span>`;
        }

        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) html += `<span style="color:#666">...</span>`;
            html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
        }

        html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">›</button>`;
        html += `<span class="page-info">第 ${currentPage} / ${totalPages} 页</span>`;

        pagination.innerHTML = html;
    }

    function goToPage(page) {
        const totalPages = Math.ceil(getFilteredTools().length / PAGE_SIZE);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTools();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.querySelectorAll('#categoryFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#categoryFilters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            currentPage = 1;
            renderTools();
        });
    });

    document.querySelectorAll('#countryFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#countryFilters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCountry = btn.dataset.country;
            currentPage = 1;
            renderTools();
        });
    });

    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            searchQuery = e.target.value.trim().toLowerCase();
            currentPage = 1;
            renderTools();
        }, 250);
    });

    window.addEventListener('scroll', () => {
        backToTop.classList.toggle('visible', window.scrollY > 500);
    });

    backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderTools();
    </script>
</body>
</html>
